<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Historyczny 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #ffe3ec;
            --pink-medium: #ffb7ce;
            --pink-dark: #ff85a1;
            --white: #ffffff;
            --soft-gray: #5a4a4a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--pink-light);
            background-image: radial-gradient(#ffb7ce 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--soft-gray);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Dekoracje boczne */
        body::before, body::after {
            content: "🎀";
            position: fixed;
            font-size: 5rem;
            opacity: 0.2;
            z-index: -1;
        }
        body::before { top: 10%; left: 5%; transform: rotate(-15deg); }
        body::after { bottom: 10%; right: 5%; transform: rotate(15deg); }

        header {
            background-color: var(--white);
            text-align: center;
            padding: 40px 20px;
            border-bottom: 8px dotted var(--pink-medium);
            box-shadow: 0 5px 15px rgba(255, 183, 206, 0.3);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5em;
            color: var(--pink-dark);
            margin: 0;
            text-shadow: 2px 2px var(--pink-light);
        }

        .nav-buttons {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background-color: var(--pink-medium);
            color: var(--white);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;
            display: inline-block;
            border: 2px solid var(--pink-dark);
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--pink-dark);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 133, 161, 0.4);
        }

        .container {
            flex: 1;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .quiz-card {
            background: var(--white);
            padding: 40px;
            border-radius: 40px;
            border: 4px solid var(--pink-medium);
            box-shadow: 0 10px 30px rgba(255, 133, 161, 0.15);
            text-align: center;
            position: relative;
        }

        .question-text {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--pink-dark);
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: var(--white);
            border: 2px solid var(--pink-light);
            padding: 15px 20px;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1em;
            font-weight: 600;
            color: var(--soft-gray);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: var(--pink-light);
            border-color: var(--pink-medium);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: #d1f2d3 !important;
            border-color: #81c784 !important;
            color: #2e7d32;
        }

        .option-btn.wrong {
            background-color: #ffdce0 !important;
            border-color: #e57373 !important;
            color: #c62828;
        }

        #result-screen {
            display: none;
        }

        .score-display {
            font-size: 4em;
            font-family: 'Dancing Script', cursive;
            color: var(--pink-dark);
            margin: 20px 0;
        }

        footer {
            text-align: center;
            padding: 40px;
            background-color: var(--white);
            color: var(--pink-dark);
            border-top: 8px dotted var(--pink-medium);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5em; }
            body::before, body::after { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Słodki Quiz Historyczny</h1>
        <div class="nav-buttons">
            <a href="index.html" class="btn">Powrót do Strony głównej</a>
        </div>
    </header>

    <div class="container">
        <div class="quiz-card" id="quiz-card">
            <div id="question-counter" style="color: var(--pink-medium); font-weight: bold; margin-bottom: 10px;">Pytanie 1 z 5</div>
            <div class="question-text" id="question-text">Ładowanie pytania...</div>
            <div class="options-grid" id="options-grid"></div>
        </div>

        <div class="quiz-card" id="result-screen">
            <h2>Koniec Quizu! ✨</h2>
            <div class="score-display" id="final-score">0/5</div>
            <p id="result-message">Świetnie Ci poszło, kochana!</p>
            <div class="nav-buttons">
                <button class="btn" onclick="location.reload()">Zagraj jeszcze raz 🎀</button>
            </div>
        </div>
    </div>

    <footer>
        <p>made with love & history 🎀 &copy; 2026 Projekt: Klaudia Karczyńska i Natalia Garwolska.</p>
    </footer>

    <script>
        // Dźwięki
        const correctSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const wrongSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3');

        const questions = [
            {
                q: "W którym roku wybuchła Rewolucja Październikowa?",
                a: ["1914", "1917", "1920", "1939"],
                correct: 1
            },
            {
                q: "Kto był głównym przywódcą bolszewików?",
                a: ["Mikołaj II", "Aleksander Kiereński", "Włodzimierz Lenin", "Józef Stalin"],
                correct: 2
            },
            {
                q: "Słynny sygnał do ataku dał krążownik o nazwie...",
                a: ["Gwiazda", "Aurora", "Victoria", "Róża"],
                correct: 1
            },
            {
                q: "Jakie były główne hasła rewolucji?",
                a: ["Ziemia, Pokój, Chleb", "Wolność, Równość, Braterstwo", "Bóg, Honor, Ojczyzna", "Praca i Sukces"],
                correct: 0
            },
            {
                q: "Jakie państwo powstało kilka lat po rewolucji?",
                a: ["Cesarstwo Rosyjskie", "ZSRR", "Federacja Rosyjska", "Rzeczpospolita"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const counter = document.getElementById('question-counter');
        const quizCard = document.getElementById('quiz-card');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');
        const resultMessage = document.getElementById('result-message');

        function loadQuestion() {
            const q = questions[currentQuestion];
            counter.innerText = `Pytanie ${currentQuestion + 1} z ${questions.length}`;
            questionText.innerText = q.q;
            optionsGrid.innerHTML = '';

            q.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(index, btn);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(index, btn) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (index === questions[currentQuestion].correct) {
                btn.classList.add('correct');
                correctSound.play(); // Play correct sound
                score++;
            } else {
                btn.classList.add('wrong');
                wrongSound.play(); // Play wrong sound
                allBtns[questions[currentQuestion].correct].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            quizCard.style.display = 'none';
            resultScreen.style.display = 'block';
            finalScore.innerText = `${score}/${questions.length}`;
            
            if (score === questions.length) {
                resultMessage.innerText = "Jesteś absolutną Historyczną Queen!";
            } else if (score >= 3) {
                resultMessage.innerText = "Poszło Ci naprawdę uroczo! Dobra robota!";
            } else {
                resultMessage.innerText = "Ups! Może warto przeczytać historię jeszcze raz?";
            }
        }

        loadQuestion();
    </script>
</body>
</html>
